<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Análisis de entrada</title>

    <!-- Base styles -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Theme-specific styles -->
    <link rel="stylesheet" href="../css/light.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="../css/dark.css" media="(prefers-color-scheme: dark)">

    <!-- Syntax highlighting themes -->
    <link rel="stylesheet" href="../css/github.min.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="../css/github-dark.min.css" media="(prefers-color-scheme: dark)">

    <!-- Math -->
    <link rel="stylesheet" href="../css/katex.css">

    <!-- Menu styles -->
    <link rel="stylesheet" href="../css/menu.css">
</head>

<body>
    <header>
        <h1>Análisis de entrada</h1>
        <!-- Hamburger button -->
        <button class="hamburger" aria-label="Open menu">☰</button>
    </header>

    <!-- Overlay and sliding panel -->
    <div class="menu-overlay"></div>
    <nav class="menu-panel">
        <ul>
            <li><a href="../index.html">Página principal</a></li>
            <li><a href="agg.html">Atlas</a></li>
        </ul>
    </nav>

    <main>
        <div id="md-container">Cargando entrada…</div>
    </main>

    <footer>
        <p>&copy; 2026 Lingüísticas Project</p>
    </footer>

    <script src="../risurcoj/linguisticas.js"></script>
    <script>
        const container = document.getElementById('md-container');

        // Helper: get query parameter
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        const file = getQueryParam('file');
        if (file) {
            fetch('eroj/' + file)
                .then(res => res.text())
                .then(md => {
                    container.innerHTML = window.renderMarkdown(md);
                })
                .catch(err => {
                    container.innerHTML =
                        "<p style='color:red'>Error loading Markdown: " + err + "</p>";
                });
        } else {
            container.innerHTML = "<p>No se especificó ninguna entrada.</p>";
        }
    </script>

    <!-- Standalone JS for hamburger -->
    <script src="../risurcoj/menu.js"></script>
</body>

</html>
